name: Twitter Auto-Post

on:
  schedule:
    # 14:00 UTC daily = ~7am PT / 10am ET / 8pm BD
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Post mode: blog | tool | queue"
        required: true
        default: "tool"
        type: choice
        options: [blog, tool, queue]

permissions:
  contents: write

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decide mode (Mon=blog, Wed/Fri=queue, else tool)
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          else
            DOW=$(date -u +%u)   # 1=Mon ... 7=Sun
            case "$DOW" in
              1) M=blog ;;
              3|5) M=queue ;;
              *) M=tool ;;
            esac
            echo "mode=$M" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Post to X
        env:
          TWITTER_CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: node scripts/twitter-post.mjs --mode=${{ steps.pick.outputs.mode }}

      - name: Commit queue update (if queue mode)
        if: steps.pick.outputs.mode == 'queue'
        run: |
          if ! git diff --quiet marketing/social-queue.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add marketing/social-queue.json
            git commit -m "chore(social): mark queued tweet as posted"
            git push
          fi
