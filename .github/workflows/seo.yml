name: SEO Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  seo-unit:
    name: SEO unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run SEO test suite
        run: npx vitest run src/test/seo.test.ts
      - name: Generate HTML + JSON SEO report
        if: always()
        run: node scripts/seo-report.mjs --from-file || node scripts/seo-report.mjs
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-report
          path: reports/

  seo-e2e:
    name: SEO end-to-end (Playwright)
    runs-on: ubuntu-latest
    needs: seo-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci || npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build site
        run: npm run build
      - name: Run Playwright SEO audit
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
