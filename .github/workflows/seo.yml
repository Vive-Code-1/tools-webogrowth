name: SEO Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  seo-unit:
    name: SEO unit tests + snapshot diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci || npm install

      - name: Restore baselines from gh-pages
        continue-on-error: true
        run: |
          mkdir -p reports/baseline/history reports/baseline/pr
          git fetch origin gh-pages --depth=1 || true
          # Last successful run (canonical baseline)
          git show origin/gh-pages:baseline/seo-snapshot.json > reports/baseline/seo-snapshot.json 2>/dev/null || echo "no canonical baseline yet"
          # Rolling history (last 5)
          for n in 01 02 03 04 05; do
            git show origin/gh-pages:baseline/history/$n.json > reports/baseline/history/$n.json 2>/dev/null || true
          done
          # PR-specific baselines
          git ls-tree -r --name-only origin/gh-pages 2>/dev/null | grep '^baseline/pr/pr-.*\.json$' | while read f; do
            mkdir -p "reports/$(dirname "$f")"
            git show "origin/gh-pages:$f" > "reports/$f" 2>/dev/null || true
          done

      - name: Run SEO test suite
        run: npx vitest run src/test/seo.test.ts

      - name: Internal linking audit (strict — fails on orphans / stale links)
        run: node scripts/internal-link-audit.mjs --strict

      - name: Generate HTML + JSON SEO report
        if: always()
        run: node scripts/seo-report.mjs

      - name: Generate SEO snapshot diff
        if: always()
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          if [ -n "$PR_NUM" ] && [ -f "reports/baseline/pr/pr-$PR_NUM.json" ]; then
            node scripts/seo-snapshot.mjs --diff --source=pr-$PR_NUM
          else
            node scripts/seo-snapshot.mjs --diff --source=last
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: seo-report, path: reports/ }

  seo-e2e:
    name: Playwright rendered audit
    runs-on: ubuntu-latest
    needs: seo-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci || npm install
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run build
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: playwright-report, path: playwright-report/ }

  lighthouse-desktop:
    name: Lighthouse (desktop)
    runs-on: ubuntu-latest
    needs: seo-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci || npm install
      - run: npm run build
      - name: Run Lighthouse CI (desktop)
        run: npx --yes @lhci/cli@0.14.x autorun --config=lighthouserc.cjs
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: lighthouse-desktop, path: reports/lighthouse/ }

  lighthouse-mobile:
    name: Lighthouse (mobile)
    runs-on: ubuntu-latest
    needs: seo-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci || npm install
      - run: npm run build
      - name: Run Lighthouse CI (mobile)
        # Same thresholds as desktop — a regression on either form factor blocks merge.
        run: npx --yes @lhci/cli@0.14.x autorun --config=lighthouserc.mobile.cjs
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: lighthouse-mobile, path: reports/lighthouse-mobile/ }

  publish-dashboard:
    name: Publish reports to GitHub Pages
    runs-on: ubuntu-latest
    needs: [seo-unit, seo-e2e, lighthouse-desktop, lighthouse-mobile]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci || npm install
      - uses: actions/download-artifact@v4
        with: { path: artifacts }

      - name: Assemble dashboard
        run: |
          mkdir -p site
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DEST="site/pr-${{ github.event.pull_request.number }}"
          else
            DEST="site/main"
          fi
          mkdir -p "$DEST"
          cp -r artifacts/seo-report/* "$DEST/" 2>/dev/null || true
          mkdir -p "$DEST/playwright"        && cp -r artifacts/playwright-report/*  "$DEST/playwright/"        2>/dev/null || true
          mkdir -p "$DEST/lighthouse"        && cp -r artifacts/lighthouse-desktop/* "$DEST/lighthouse/"        2>/dev/null || true
          mkdir -p "$DEST/lighthouse-mobile" && cp -r artifacts/lighthouse-mobile/*  "$DEST/lighthouse-mobile/" 2>/dev/null || true
          # Regenerate the SEO report with Playwright failure artifacts now that both are colocated.
          if [ -f "$DEST/seo-results.json" ] && [ -f "$DEST/playwright/results.json" ]; then
            mkdir -p reports playwright-report
            cp "$DEST/seo-results.json" reports/seo-results.json
            cp "$DEST/playwright/results.json" playwright-report/results.json
            node scripts/seo-report.mjs --from-file
            cp reports/seo-report.html "$DEST/seo-report.html"
            cp reports/seo-report.json "$DEST/seo-report.json"
          fi
          node scripts/build-dashboard.mjs "$DEST"

      - name: Promote baseline + rotate history on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.seo-unit.result == 'success'
        run: |
          # Restore previous history from gh-pages, then rotate with current snapshot.
          mkdir -p reports/baseline/history
          git fetch origin gh-pages --depth=1 || true
          for n in 01 02 03 04 05; do
            git show origin/gh-pages:baseline/history/$n.json > reports/baseline/history/$n.json 2>/dev/null || true
          done
          cp artifacts/seo-report/seo-snapshot.json reports/seo-snapshot.json
          node scripts/seo-snapshot.mjs --promote
          mkdir -p site/baseline/history site/baseline/pr
          cp reports/baseline/seo-snapshot.json site/baseline/seo-snapshot.json
          cp reports/baseline/history/*.json site/baseline/history/ 2>/dev/null || true

      - name: Freeze PR baseline on first PR run
        if: github.event_name == 'pull_request'
        run: |
          PR=${{ github.event.pull_request.number }}
          mkdir -p site/baseline/pr
          # Only seed if no PR baseline exists yet — keeps the PR diff stable across pushes.
          git fetch origin gh-pages --depth=1 || true
          if ! git show origin/gh-pages:baseline/pr/pr-$PR.json > /dev/null 2>&1; then
            cp artifacts/seo-report/seo-snapshot.json site/baseline/pr/pr-$PR.json
            echo "Seeded PR baseline pr-$PR.json"
          else
            git show origin/gh-pages:baseline/pr/pr-$PR.json > site/baseline/pr/pr-$PR.json
            echo "Re-published existing PR baseline pr-$PR.json"
          fi

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true

      - name: Comment dashboard link on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: seo-dashboard
          message: |
            ### 📊 SEO Dashboard for this PR
            - [SEO report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/seo-report.html) (with search + pass/fail filter)
            - [Snapshot diff vs PR baseline](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/seo-diff.html) (with changed/new/removed filter)
            - [Playwright report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/playwright/index.html) — screenshots, videos, trace viewer
            - [Lighthouse desktop](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/lighthouse/) · [mobile](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/lighthouse-mobile/)
