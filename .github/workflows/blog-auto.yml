name: Daily SEO Blog Post

on:
  schedule:
    # 06:00 UTC daily = 12:00 noon Bangladesh time
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blog-auto
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Generate post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_FOR_DAILY_AUTO_BLOG }}
        run: node scripts/generate-blog-post.mjs

      - name: Commit & push
        run: |
          if git diff --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p public/blog-images
          git add src/blog/posts.ts public/sitemap.xml marketing/blog-topic-queue.json
          git add public/blog-images 2>/dev/null || true
          git commit -m "chore(blog): auto-publish daily SEO post [skip ci]"
          git push

      - name: Ping IndexNow (Bing, Yandex, etc.)
        run: node scripts/indexnow-submit.mjs

      - name: Ping Google sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://tools.webogrowth.com/sitemap.xml" || true
