name: Daily SEO Blog Post

on:
  schedule:
    # 06:00 UTC daily = 12:00 noon Bangladesh time
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blog-auto
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Checkout with PAT (if available) so commits are attributed to a real user
      # and reset GitHub Actions' 60-day "inactive repo" timer that would otherwise
      # disable scheduled workflows. Falls back to GITHUB_TOKEN if PAT is missing.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BLOG_BOT_PAT || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Generate post
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_FOR_DAILY_AUTO_BLOG }}
        run: node scripts/generate-blog-post.mjs

      - name: Commit & push
        id: commit
        env:
          USING_PAT: ${{ secrets.BLOG_BOT_PAT != '' }}
        run: |
          if git diff --quiet; then
            echo "No changes — nothing to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$USING_PAT" = "true" ]; then
            git config user.name "webogrowth-bot"
            git config user.email "bot@webogrowth.com"
            echo "→ pushing with BLOG_BOT_PAT (counts as human activity)"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            echo "⚠ BLOG_BOT_PAT not set — using GITHUB_TOKEN. Schedule will auto-disable after 60 days of no human commits."
          fi
          mkdir -p public/blog-images
          git add src/blog/posts.ts public/sitemap.xml marketing/blog-topic-queue.json
          git add public/blog-images 2>/dev/null || true
          git commit -m "chore(blog): auto-publish daily SEO post [skip ci]"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      # Auto-indexing runs even when no new commit happened (manual re-runs),
      # so a missed cron day still gets re-submitted. Failures FAIL the job —
      # silent `|| true` is what hid the breakage that prompted this fix.
      - name: Extract latest post URL from sitemap
        id: latest
        run: |
          LATEST_URL=$(grep -oP '<loc>\Khttps://tools\.webogrowth\.com/blog/[^<]+' public/sitemap.xml | tail -n 1)
          echo "Latest blog URL: $LATEST_URL"
          echo "url=$LATEST_URL" >> "$GITHUB_OUTPUT"

      - name: Ping IndexNow (Bing, Yandex, Seznam, Naver) — full sitemap
        run: node scripts/indexnow-submit.mjs

      - name: Ping IndexNow for the new post specifically (instant pickup)
        if: steps.latest.outputs.url != ''
        run: |
          curl -fsS -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"host\":\"tools.webogrowth.com\",\"key\":\"02a13238b42e97d3a8ff90893f5215d6\",\"keyLocation\":\"https://tools.webogrowth.com/02a13238b42e97d3a8ff90893f5215d6.txt\",\"urlList\":[\"${{ steps.latest.outputs.url }}\"]}"
          echo

      - name: Resubmit sitemap to Google Search Console
        run: |
          RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://vgfpjhimlztysvpxcgab.supabase.co/functions/v1/gsc-manage" \
            -H "Content-Type: application/json" \
            -d '{"action":"submit_sitemap","siteUrl":"https://tools.webogrowth.com/","feedpath":"https://tools.webogrowth.com/sitemap.xml"}')
          echo "$RESP"
          STATUS=$(echo "$RESP" | grep -oP 'HTTP_STATUS:\K[0-9]+')
          if [ "$STATUS" != "200" ]; then
            echo "::error::GSC sitemap resubmit failed with HTTP $STATUS"
            exit 1
          fi

